description = "Save this conversation to purmemo as a living document"
prompt = """
Save this conversation to purmemo as a living document.

Call `save_conversation` with the COMPLETE conversation content. Follow these rules exactly:

Title: Generate a descriptive title in the format: [Project] - [Topic] - [Type]
Same title = updates existing memory (living document pattern). Use consistent titles.

Content: Include EVERYTHING verbatim — never summarize. Every user message, every assistant response, all code blocks.
Format as: === CONVERSATION START === then USER: / ASSISTANT: pairs. Minimum 500 characters.

Tags: Add 3-5 relevant tags like ["project-name", "feature", "type"]

Important: If you've saved this conversation before with the same title, it UPDATES (not duplicates). Never send just a summary.

{{args}}
"""

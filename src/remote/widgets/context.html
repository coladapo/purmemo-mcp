<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  *{box-sizing:border-box}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       margin:0;padding:10px;background:transparent;-webkit-font-smoothing:antialiased}

  /* ══ LIGHT MODE (default — no class needed) ══ */
  body{color:#111111}
  .hero{background:#f0f0f0;border:1px solid rgba(0,0,0,0.08);border-radius:16px;
        padding:14px;margin-bottom:8px;transition:border-color .2s,background .2s}
  .hero:hover{border-color:rgba(0,0,0,0.15)}
  .hero-title{color:#111111}
  .hero-meta{color:rgba(0,0,0,0.5)}
  .hero-preview{color:rgba(0,0,0,0.6)}
  /* Light: #E7FC44 as filled chip — lime bg + dark text = readable */
  .btn-inject{background:#E7FC44;color:#1a1a1a;border-color:#E7FC44}
  .btn-inject:hover{background:#d4e83c;border-color:#d4e83c}
  .btn-open{color:rgba(0,0,0,0.5);border-color:rgba(0,0,0,0.15)}
  .btn-open:hover{color:rgba(0,0,0,0.85);border-color:rgba(0,0,0,0.3);background:rgba(0,0,0,0.04)}
  .card{background:transparent;border-bottom:1px solid rgba(0,0,0,0.07);border-radius:0}
  .card:first-of-type{border-top:1px solid rgba(0,0,0,0.07)}
  .card:hover{background:rgba(0,0,0,0.03)}
  .card:last-child{border-bottom:none}
  .card-title{color:#111111}
  .card-meta{color:rgba(0,0,0,0.4)}
  .divider{color:rgba(0,0,0,0.3)}
  .empty,.loading{color:rgba(0,0,0,0.35)}
  #feedback{color:rgba(0,0,0,0.5)}
  .hero-icon{background:#e0e0e0}
  .score{background:#E7FC44;color:#1a1a1a}
  .badge-accent{background:#E7FC44;color:#1a1a1a}
  .card-dot{background:#1a1a1a}

  /* ══ DARK MODE — body.dark class set by JS bridge ══ */
  body.dark{color:#ffffff}
  body.dark .hero{background:#1a1a1a;border-color:rgba(255,255,255,0.08)}
  body.dark .hero:hover{border-color:rgba(255,255,255,0.18)}
  body.dark .hero-title{color:#ffffff}
  body.dark .hero-meta{color:rgba(255,255,255,0.5)}
  body.dark .hero-preview{color:rgba(255,255,255,0.55)}
  body.dark .btn-inject{background:transparent;color:#E7FC44;border-color:rgba(231,252,68,0.3)}
  body.dark .btn-inject:hover{border-color:rgba(231,252,68,0.6);background:rgba(231,252,68,0.06)}
  body.dark .btn-open{color:rgba(255,255,255,0.45);border-color:rgba(255,255,255,0.1)}
  body.dark .btn-open:hover{color:rgba(255,255,255,0.85);border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.05)}
  body.dark .card{background:transparent;border-bottom:1px solid rgba(255,255,255,0.06);border-radius:0}
  body.dark .card:first-of-type{border-top:1px solid rgba(255,255,255,0.06)}
  body.dark .card:hover{background:rgba(255,255,255,0.04)}
  body.dark .card:last-child{border-bottom:none}
  body.dark .card-title{color:rgba(255,255,255,0.8)}
  body.dark .card-meta{color:rgba(255,255,255,0.3)}
  body.dark .divider{color:rgba(255,255,255,0.25)}
  body.dark .empty,body.dark .loading{color:rgba(255,255,255,0.3)}
  body.dark #feedback{color:rgba(255,255,255,0.45)}
  body.dark .hero-icon{background:#000}
  body.dark .score{background:rgba(231,252,68,0.12);color:#E7FC44}
  body.dark .badge-accent{background:rgba(231,252,68,0.15);color:#E7FC44}
  body.dark .card-dot{background:#E7FC44}

  /* ══ SHARED (mode-agnostic) ══ */
  .hero-icon{width:32px;height:32px;border-radius:8px;overflow:hidden;
             flex-shrink:0;float:left;margin-right:10px}
  .hero-icon img{width:32px;height:32px;object-fit:cover;display:block}
  .hero-body{overflow:hidden}
  .hero-title{font-weight:600;font-size:14px;line-height:1.35;margin-bottom:4px;
              display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero-meta{font-size:11px;margin-bottom:7px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .hero-preview{font-size:12px;line-height:1.5;margin-bottom:10px;
                display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hero-actions{display:flex;gap:6px;clear:both}
  .btn-inject{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;
              border:1px solid;border-radius:8px;padding:5px 11px;cursor:pointer;
              transition:color .2s,border-color .2s,background .2s}
  .btn-open{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
            background:transparent;border:1px solid;border-radius:8px;padding:5px 11px;cursor:pointer;
            transition:color .2s,border-color .2s,background .2s}
  .card{padding:10px 12px;margin-bottom:0;cursor:pointer;
        transition:background .2s}
  .card-row{display:flex;align-items:flex-start;gap:8px}
  .card-dot{width:5px;height:5px;border-radius:50%;margin-top:6px;flex-shrink:0;transition:background .2s}
  .card-title{font-weight:600;font-size:13px;line-height:1.3;margin-bottom:2px;
              display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-meta{font-size:11px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;
         border-radius:4px;padding:1px 6px;line-height:1.5}
  /* Platform brand colors — dark mode (default, semi-transparent on dark bg) */
  .badge-accent{}
  .badge-claude{background:rgba(217,119,87,0.2);color:#D97757}
  .badge-openai{background:rgba(255,255,255,0.12);color:#ffffff}
  .badge-gemini{background:rgba(66,133,244,0.2);color:#4285F4}
  .badge-cursor{background:rgba(139,92,246,0.2);color:#a78bfa}
  .badge-chrome{background:rgba(249,115,22,0.2);color:#fb923c}
  .badge-gray{background:rgba(107,114,128,0.2);color:#9ca3af}
  /* Light mode overrides — darker text for readability on light bg */
  body:not(.dark) .badge-claude{background:rgba(217,119,87,0.12);color:#b85c35}
  body:not(.dark) .badge-openai{background:rgba(0,0,0,0.08);color:#111111}
  body:not(.dark) .badge-gemini{background:rgba(66,133,244,0.12);color:#1a56c4}
  body:not(.dark) .badge-cursor{background:rgba(139,92,246,0.12);color:#6d28d9}
  body:not(.dark) .badge-chrome{background:rgba(249,115,22,0.12);color:#c2510a}
  body:not(.dark) .badge-gray{background:rgba(107,114,128,0.12);color:#4b5563}
  .score{display:inline-flex;align-items:center;font-size:10px;font-weight:500;
         border-radius:4px;padding:1px 5px}
  .divider{font-size:10px;font-weight:600;text-transform:uppercase;
           letter-spacing:.07em;margin:10px 0 6px;padding-left:2px}
  .empty{text-align:center;padding:28px 16px;font-size:13px}
  .loading{text-align:center;padding:28px 16px;font-size:13px}
  #feedback{display:none;font-size:11px;margin-top:6px;padding-left:2px}

  /* Context widget — theme-aware */
  .ctx-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:10px 0 4px;padding-left:2px}
  .ctx-row{display:flex;align-items:center;gap:6px;padding:3px 0}
  .ctx-val{font-size:12px;font-weight:500}
  .ctx-num{font-size:20px;font-weight:700;line-height:1}
  .ctx-label{font-size:11px}
  .ctx-stats{display:flex;gap:16px;padding:10px 0 6px}
  /* Light */
  .ctx-section{color:rgba(0,0,0,0.4)}
  .ctx-val{color:#111111}
  .ctx-num{color:#111111}
  .ctx-label{color:rgba(0,0,0,0.45)}
  /* Dark */
  body.dark .ctx-section{color:rgba(255,255,255,0.35)}
  body.dark .ctx-val{color:#ffffff}
  body.dark .ctx-num{color:#E7FC44}
  body.dark .ctx-label{color:rgba(255,255,255,0.4)}
</style></head>
<body><div id="root"><div class="loading">Loading your context&#x2026;</div></div>
<script type="text/javascript">
(function(){
  function applyScheme(){
    try{var s=window.openai&&window.openai.colorScheme;
      if(s==='dark'){document.body.classList.add('dark');return true;}
      if(s==='light'){document.body.classList.remove('dark');return true;}
    }catch(e){}
    try{if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){document.body.classList.add('dark');return true;}}catch(e){}
    return false;
  }
  applyScheme();
  setTimeout(function(){applyScheme();},50);
  setTimeout(function(){applyScheme();},300);

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function platBadge(plat){
    if(!plat)return '';
    var p=plat.toLowerCase().replace(/[-_\s]+/g,'');
    var cls='badge ';
    if(p==='claude'||p==='claudeai'||p==='claudeextension'||p==='claudecode'){cls+='badge-claude';}
    else if(p==='chatgpt'||p==='openai'){cls+='badge-openai';}
    else if(p==='gemini'||p==='google'){cls+='badge-gemini';}
    else if(p==='cursor'||p==='copilot'||p==='windsurf'){cls+='badge-cursor';}
    else if(p==='chrome'||p==='chromeextension'){cls+='badge-chrome';}
    else{cls+='badge-gray';}
    return '<span class="'+cls+'">'+esc(plat)+'</span>';
  }

  function render(out){
    var root=document.getElementById('root');

    // Parse key stats from tool output
    var totalMem=0,thisWeek=0,today=0,platforms=[],projects=[];
    try{
      var tm=out.match(/Total(?:\s+memories)?[:\s]+(\d+)/i);if(tm)totalMem=parseInt(tm[1]);
      var wk=out.match(/This\s+week[:\s]+(\d+)/i);if(wk)thisWeek=parseInt(wk[1]);
      var td=out.match(/Today[:\s]+(\d+)/i);if(td)today=parseInt(td[1]);
      // Platforms — extract from "Platforms:" section or badge-like entries
      var pl=out.match(/Platforms?\s*:\s*([^\n]+)/i);
      if(pl){platforms=pl[1].split(/[,;·|\/]+/).map(function(x){return x.trim();}).filter(function(x){return x.length>1&&x.length<30;}).slice(0,5);}
      // Projects — lines that look like project names
      var prj=out.match(/Projects?\s*:\s*([^\n]+)/i);
      if(prj){projects=prj[1].split(/[,;]+/).map(function(x){return x.trim();}).filter(function(x){return x.length>2;}).slice(0,3);}
      // Fallback: extract **Bold** headings as projects
      if(!projects.length){var bolds=out.match(/\*\*([^*\n]{3,50})\*\*/g);if(bolds)projects=bolds.slice(0,3).map(function(b){return b.replace(/\*\*/g,'');});}
    }catch(e){}

    var html='<div class="hero">';
    // Stats row
    if(totalMem||thisWeek||today){
      html+='<div class="ctx-stats">';
      if(totalMem)html+='<div><div class="ctx-num">'+totalMem+'</div><div class="ctx-label">memories</div></div>';
      if(thisWeek)html+='<div><div class="ctx-num">'+thisWeek+'</div><div class="ctx-label">this week</div></div>';
      if(today)html+='<div><div class="ctx-num">'+today+'</div><div class="ctx-label">today</div></div>';
      html+='</div>';
    }
    // Platforms
    if(platforms.length){
      html+='<div class="ctx-section">Sources</div>';
      html+='<div class="card-meta" style="margin-bottom:8px">'+platforms.map(function(p){return platBadge(p);}).join('')+'</div>';
    }
    // Projects
    if(projects.length){
      html+='<div class="ctx-section">Active projects</div>';
      projects.forEach(function(p){
        html+='<div class="ctx-row"><div class="card-dot"></div><div class="ctx-val">'+esc(p.slice(0,60))+'</div></div>';
      });
    }
    // Fallback: render raw lines if nothing parsed
    if(!totalMem&&!platforms.length&&!projects.length){
      var lines=out.split('\n').filter(function(l){return l.trim()&&!l.startsWith('=');}).slice(0,8);
      lines.forEach(function(l){html+='<div class="ctx-row"><div class="ctx-val">'+esc(l.trim().slice(0,80))+'</div></div>';});
    }
    html+='</div>';
    root.innerHTML=html||'<div class="empty">No context available yet.</div>';
    try{var h=root.scrollHeight;if(window.openai&&window.openai.notifyIntrinsicHeight)window.openai.notifyIntrinsicHeight(h+20);}catch(e){}
  }
  var rendered=false;
  function tryRender(){
    if(rendered)return;
    var out='';
    try{var oi=window.openai;if(oi){out=oi.toolOutput||'';}}catch(e){}
    if(!out||out.length<10)return;
    rendered=true;
    render(out);
  }
  var _attempts=0;
  var _poll=setInterval(function(){_attempts++;tryRender();if(rendered||_attempts>=120)clearInterval(_poll);},500);
})();
</script></body></html>

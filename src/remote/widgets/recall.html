<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  *{box-sizing:border-box}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       margin:0;padding:10px;background:transparent;-webkit-font-smoothing:antialiased}

  /* ══ LIGHT MODE (default — no class needed) ══ */
  body{color:#111111}
  .hero{background:#f0f0f0;border:1px solid rgba(0,0,0,0.08);border-radius:16px;
        padding:14px;margin-bottom:8px;transition:border-color .2s,background .2s}
  .hero:hover{border-color:rgba(0,0,0,0.15)}
  .hero-title{color:#111111}
  .hero-meta{color:rgba(0,0,0,0.5)}
  .hero-preview{color:rgba(0,0,0,0.6)}
  /* Light: #E7FC44 as filled chip — lime bg + dark text = readable */
  .btn-inject{background:#E7FC44;color:#1a1a1a;border-color:#E7FC44}
  .btn-inject:hover{background:#d4e83c;border-color:#d4e83c}
  .btn-open{color:rgba(0,0,0,0.5);border-color:rgba(0,0,0,0.15)}
  .btn-open:hover{color:rgba(0,0,0,0.85);border-color:rgba(0,0,0,0.3);background:rgba(0,0,0,0.04)}
  .card{background:transparent;border-bottom:1px solid rgba(0,0,0,0.07);border-radius:0}
  .card:first-of-type{border-top:1px solid rgba(0,0,0,0.07)}
  .card:hover{background:rgba(0,0,0,0.03)}
  .card:last-child{border-bottom:none}
  .card-title{color:#111111}
  .card-meta{color:rgba(0,0,0,0.4)}
  .divider{color:rgba(0,0,0,0.3)}
  .empty,.loading{color:rgba(0,0,0,0.35)}
  #feedback{color:rgba(0,0,0,0.5)}
  .hero-icon{background:#e0e0e0}
  .score{background:#E7FC44;color:#1a1a1a}
  .badge-accent{background:#E7FC44;color:#1a1a1a}
  .card-dot{background:#1a1a1a}

  /* ══ DARK MODE — body.dark class set by JS bridge ══ */
  body.dark{color:#ffffff}
  body.dark .hero{background:#1a1a1a;border-color:rgba(255,255,255,0.08)}
  body.dark .hero:hover{border-color:rgba(255,255,255,0.18)}
  body.dark .hero-title{color:#ffffff}
  body.dark .hero-meta{color:rgba(255,255,255,0.5)}
  body.dark .hero-preview{color:rgba(255,255,255,0.55)}
  body.dark .btn-inject{background:transparent;color:#E7FC44;border-color:rgba(231,252,68,0.3)}
  body.dark .btn-inject:hover{border-color:rgba(231,252,68,0.6);background:rgba(231,252,68,0.06)}
  body.dark .btn-open{color:rgba(255,255,255,0.45);border-color:rgba(255,255,255,0.1)}
  body.dark .btn-open:hover{color:rgba(255,255,255,0.85);border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.05)}
  body.dark .card{background:transparent;border-bottom:1px solid rgba(255,255,255,0.06);border-radius:0}
  body.dark .card:first-of-type{border-top:1px solid rgba(255,255,255,0.06)}
  body.dark .card:hover{background:rgba(255,255,255,0.04)}
  body.dark .card:last-child{border-bottom:none}
  body.dark .card-title{color:rgba(255,255,255,0.8)}
  body.dark .card-meta{color:rgba(255,255,255,0.3)}
  body.dark .divider{color:rgba(255,255,255,0.25)}
  body.dark .empty,body.dark .loading{color:rgba(255,255,255,0.3)}
  body.dark #feedback{color:rgba(255,255,255,0.45)}
  body.dark .hero-icon{background:#000}
  body.dark .score{background:rgba(231,252,68,0.12);color:#E7FC44}
  body.dark .badge-accent{background:rgba(231,252,68,0.15);color:#E7FC44}
  body.dark .card-dot{background:#E7FC44}

  /* ══ SHARED (mode-agnostic) ══ */
  .hero-icon{width:32px;height:32px;border-radius:8px;overflow:hidden;
             flex-shrink:0;float:left;margin-right:10px}
  .hero-icon img{width:32px;height:32px;object-fit:cover;display:block}
  .hero-body{overflow:hidden}
  .hero-title{font-weight:600;font-size:14px;line-height:1.35;margin-bottom:4px;
              display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero-meta{font-size:11px;margin-bottom:7px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .hero-preview{font-size:12px;line-height:1.5;margin-bottom:10px;
                display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hero-actions{display:flex;gap:6px;clear:both}
  .btn-inject{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;
              border:1px solid;border-radius:8px;padding:5px 11px;cursor:pointer;
              transition:color .2s,border-color .2s,background .2s}
  .btn-open{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
            background:transparent;border:1px solid;border-radius:8px;padding:5px 11px;cursor:pointer;
            transition:color .2s,border-color .2s,background .2s}
  .card{padding:10px 12px;margin-bottom:0;cursor:pointer;
        transition:background .2s}
  .card-row{display:flex;align-items:flex-start;gap:8px}
  .card-dot{width:5px;height:5px;border-radius:50%;margin-top:6px;flex-shrink:0;transition:background .2s}
  .card-title{font-weight:600;font-size:13px;line-height:1.3;margin-bottom:2px;
              display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-meta{font-size:11px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;
         border-radius:4px;padding:1px 6px;line-height:1.5}
  /* Platform brand colors — dark mode (default, semi-transparent on dark bg) */
  .badge-accent{}
  .badge-claude{background:rgba(217,119,87,0.2);color:#D97757}
  .badge-openai{background:rgba(255,255,255,0.12);color:#ffffff}
  .badge-gemini{background:rgba(66,133,244,0.2);color:#4285F4}
  .badge-cursor{background:rgba(139,92,246,0.2);color:#a78bfa}
  .badge-chrome{background:rgba(249,115,22,0.2);color:#fb923c}
  .badge-gray{background:rgba(107,114,128,0.2);color:#9ca3af}
  /* Light mode overrides — darker text for readability on light bg */
  body:not(.dark) .badge-claude{background:rgba(217,119,87,0.12);color:#b85c35}
  body:not(.dark) .badge-openai{background:rgba(0,0,0,0.08);color:#111111}
  body:not(.dark) .badge-gemini{background:rgba(66,133,244,0.12);color:#1a56c4}
  body:not(.dark) .badge-cursor{background:rgba(139,92,246,0.12);color:#6d28d9}
  body:not(.dark) .badge-chrome{background:rgba(249,115,22,0.12);color:#c2510a}
  body:not(.dark) .badge-gray{background:rgba(107,114,128,0.12);color:#4b5563}
  .score{display:inline-flex;align-items:center;font-size:10px;font-weight:500;
         border-radius:4px;padding:1px 5px}
  .divider{font-size:10px;font-weight:600;text-transform:uppercase;
           letter-spacing:.07em;margin:10px 0 6px;padding-left:2px}
  .empty{text-align:center;padding:28px 16px;font-size:13px}
  .loading{text-align:center;padding:28px 16px;font-size:13px}
  #feedback{display:none;font-size:11px;margin-top:6px;padding-left:2px}
</style></head>
<body><div id="root"><div class="loading">Searching your memory vault&#x2026;</div></div>
<script type="text/javascript">
(function(){
  var root=document.getElementById('root');
  var rendered=false;

  // Apply color scheme — light is default, body.dark added only when bridge says dark
  function applyScheme(){
    try{
      var scheme=window.openai&&window.openai.colorScheme;
      if(scheme==='dark'){document.body.classList.add('dark');return true;}
      if(scheme==='light'){document.body.classList.remove('dark');return true;}
    }catch(e){}
    // Fallback: matchMedia — only add dark if explicitly dark
    try{
      if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){
        document.body.classList.add('dark');return true;
      }
    }catch(e){}
    return false;
  }
  applyScheme();
  // Retry — bridge may not be injected at parse time
  setTimeout(function(){applyScheme();},50);
  setTimeout(function(){applyScheme();},300);

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // Unwrap whatever shape the MCP bridge delivers.
  // toolOutput = {text: "{\"content\":[{\"type\":\"text\",\"text\":\"Found 10 memories...\"}]}"}
  // So: toolOutput.text is a JSON string we must parse to get content[0].text
  function extractText(data){
    if(!data)return '';
    if(typeof data==='string'){
      // Maybe it's a JSON string wrapping {content:[...]}
      try{
        var p=JSON.parse(data);
        var inner=extractText(p);
        if(inner&&inner.length>10)return inner;
      }catch(e){}
      return data;
    }
    // data.text exists — could be the raw memory text OR a JSON string to parse further
    if(data.text&&typeof data.text==='string'){
      try{
        var p2=JSON.parse(data.text);
        var inner2=extractText(p2);
        if(inner2&&inner2.length>10)return inner2;
      }catch(e){}
      return data.text;
    }
    // data.content array: [{type:'text',text:'...'}]
    if(data.content&&Array.isArray(data.content)){
      var parts=[];
      for(var i=0;i<data.content.length;i++){
        var c=data.content[i];
        if(c&&c.text)parts.push(c.text);
        else if(typeof c==='string')parts.push(c);
      }
      if(parts.length)return parts.join('\n');
    }
    if(data.structuredContent){try{return JSON.stringify(data.structuredContent);}catch(e){}}
    try{return JSON.stringify(data);}catch(e){return String(data);}
  }

  function parseMemories(out){
    if(!out)return [];
    // Strategy 1: JSON {"memories":[...]}
    try{
      var rx1=out.match(/"memories"\s*:\s*(\[[\s\S]*?\])/);
      if(rx1){var arr=JSON.parse(rx1[1]);if(arr&&arr.length)return arr.slice(0,6);}
    }catch(e){}
    // Strategy 2: top-level JSON array
    try{var a2=JSON.parse(out);if(Array.isArray(a2)&&a2.length)return a2.slice(0,6);}catch(e){}
    // Strategy 3: actual tool output format (confirmed via debug):
    //   "**Title**\nID: uuid\nRelevance Score: 88.2\nCreated: 2025-11-01...\nProject: X\nPlatform: claude\nPreview: ..."
    //   Entries separated by blank lines. No bullet points, no numbers.
    var memories=[];
    try{
      var lines=out.split('\n');var cur=null;
      for(var i=0;i<lines.length;i++){
        var ln=lines[i];
        var trimmed=ln.trim();
        var boldMatch=trimmed.match(/^\*\*(.+?)\*\*\s*$/);
        if(boldMatch){
          if(cur)memories.push(cur);
          cur={title:boldMatch[1].trim(),platform:'',date_str:'',relevance:'',preview:''};
        } else if(cur&&trimmed){
          var kv=trimmed.match(/^(Relevance Score|Created|Project|Platform|Preview|Topic|Status|Focus|Content|Task|Purpose|ID)\s*:\s*(.+)$/i);
          if(kv){
            var k=kv[1].toLowerCase().replace(/\s+/g,'_'),v=kv[2].trim();
            if(k==='platform')cur.platform=v;
            else if(k==='created')cur.date_str=v.slice(0,10);
            else if(k==='relevance_score')cur.relevance=Math.round(parseFloat(v))+'%';
            else if(k==='id')cur.memory_id=v;
            else if(!cur.preview&&(k==='preview'||k==='topic'||k==='project'||k==='status'||k==='focus'||k==='content'||k==='task'||k==='purpose')){
              // Strip artifact markers that leak from chunked conversation saves
              var cleaned=v.replace(/={2,}\s*(END|START|CONVERSATION|ARTIFACTS?|CODE BLOCKS?)\s*={2,}/gi,'').trim();
              if(cleaned)cur.preview=cleaned;
            }
          }
        } else if(cur&&!trimmed){
          memories.push(cur);cur=null;
        }
      }
      if(cur)memories.push(cur);
      if(memories.length){
        return memories.slice(0,6).map(function(x){
          return {title:x.title,platform:x.platform,date_str:x.date_str,
                  relevance_score_str:x.relevance,content_preview:x.preview,memory_id:x.memory_id||''};
        });
      }
    }catch(e){}
    return [];
  }

  function showFeedback(msg){
    var fb=document.getElementById('feedback');
    if(fb){fb.textContent=msg;fb.style.display='block';setTimeout(function(){fb.style.display='none';},2500);}
  }

  function injectContext(memory){
    // callTool/openPromptInput are DEV-gated (422 on all arg shapes) — unlocks post-approval
    // Best DEV fallback: open the memory deeplink (same as Open button)
    openMemory(memory);
  }

  function openMemory(memory){
    var id=memory.memory_id||memory.id||'';
    var url='https://app.purmemo.ai/dashboard'+(id?'?memory='+encodeURIComponent(id):'');
    try{
      var oi=window.openai;
      if(oi&&typeof oi.openExternal==='function'){
        oi.openExternal({href:url});showFeedback('Opening\u2026');
      } else if(oi&&typeof oi.setOpenInAppUrl==='function'){
        oi.setOpenInAppUrl(url);showFeedback('Opening\u2026');
      } else {
        window.open(url,'_blank');showFeedback('Opening\u2026');
      }
    }catch(e){showFeedback('err: '+e);}
  }

  function platBadge(plat){
    if(!plat)return '';
    var p=plat.toLowerCase().replace(/[-_\s]+/g,'');
    var cls='badge ';
    var label=plat;
    if(p==='claude'||p==='claudeextension'||p==='claudeai'){cls+='badge-claude';label='Claude';}
    else if(p==='claudecode'){cls+='badge-claude';label='Claude Code';}
    else if(p==='chatgpt'||p==='openai'){cls+='badge-openai';label='ChatGPT';}
    else if(p==='mcp'||p==='purmemo'){cls+='badge-accent';label=p==='mcp'?'MCP':'Purmemo';}
    else if(p==='chrome'||p==='chromeextension'){cls+='badge-chrome';label='Chrome';}
    else if(p==='gemini'||p==='google'){cls+='badge-gemini';label='Gemini';}
    else if(p==='cursor'){cls+='badge-cursor';label='Cursor';}
    else if(p==='copilot'){cls+='badge-cursor';label='Copilot';}
    else if(p==='windsurf'){cls+='badge-cursor';label='Windsurf';}
    else if(p==='grok'||p==='xai'){cls+='badge-gray';label='Grok';}
    else{cls+='badge-gray';}
    return '<span class="'+cls+'">'+esc(label)+'</span>';
  }

  function renderHero(m){
    var plat=m.platform||m.source_platform||'';
    var date=m.date_str||'';
    var score=m.relevance_score_str||'';
    var preview=(m.content_preview||m.preview||'').slice(0,150);
    var ringSrc=document.getElementById('ring-src');
    var ringImg=ringSrc?'<img src="'+ringSrc.src+'" width="32" height="32" style="display:block">':'';
    var html='<div class="hero">'
      +(ringImg?'<div class="hero-icon">'+ringImg+'</div>':'')
      +'<div class="hero-body">'
      +'<div class="hero-title">'+esc(m.title||'Untitled')+'</div>'
      +'<div class="hero-meta">'
      +platBadge(plat)
      +(score?'<span class="score">'+score+'</span>':'')
      +(date?'<span>'+esc(date)+'</span>':'')
      +'</div>'
      +(preview?'<div class="hero-preview">'+esc(preview)+'</div>':'')
      +'<div class="hero-actions">'
      +'<button class="btn-inject" id="btn-inject-0">\u29c9 View memory</button>'
      +'<button class="btn-open" id="btn-open-0">Open \u2197</button>'
      +'</div>'
      +'</div>'
      +'</div>';
    return html;
  }

  function renderSecondary(memories){
    if(!memories.length)return '';
    var html='<div class="divider">Also relevant</div>';
    html+=memories.map(function(m,i){
      var plat=m.platform||m.source_platform||'';
      var date=m.date_str||'';
      return '<div class="card" id="card-'+(i+1)+'">'
        +'<div class="card-row">'
        +'<div class="card-dot"></div>'
        +'<div style="overflow:hidden;flex:1">'
        +'<div class="card-title">'+esc(m.title||'Untitled')+'</div>'
        +'<div class="card-meta">'+platBadge(plat)+(date?'<span>'+esc(date)+'</span>':'')+'</div>'
        +'</div></div>'
        +'</div>';
    }).join('');
    return html;
  }

  function render(out){
    if(rendered||!out)return;
    var memories=parseMemories(out);
    if(!memories.length)return; // keep polling — don't show empty yet
    rendered=true;
    var hero=memories[0];
    var rest=memories.slice(1);
    root.innerHTML=renderHero(hero)+renderSecondary(rest)+'<div id="feedback"></div>';
    // Wire inject button
    var injectBtn=document.getElementById('btn-inject-0');
    if(injectBtn)injectBtn.addEventListener('click',function(){injectContext(hero);});
    // Wire open button
    var openBtn=document.getElementById('btn-open-0');
    if(openBtn)openBtn.addEventListener('click',function(){openMemory(hero);});
    // Wire secondary card clicks → inject
    for(var j=0;j<rest.length;j++){
      (function(idx,mem){
        var c=document.getElementById('card-'+(idx+1));
        if(c)c.addEventListener('click',function(){injectContext(mem);});
      })(j,rest[j]);
    }
    // Notify ChatGPT of our rendered height
    try{
      var h=root.scrollHeight;
      if(window.openai&&window.openai.notifyIntrinsicHeight)window.openai.notifyIntrinsicHeight(h+20);
    }catch(e){}
  }

  function handleData(data){
    if(rendered)return;
    var out=extractText(data);
    if(out&&out.length>20)render(out);
  }

  // Poll: toolOutput is null at widget load, populated after tool completes
  var attempts=0;
  var poller=setInterval(function(){
    attempts++;
    try{
      var oi=window.openai;
      if(oi){
        var to=oi.toolOutput;
        if(to!==null&&to!==undefined){handleData(to);}
        if(!rendered&&oi.widget&&oi.widget.props){handleData(oi.widget.props);}
      }
    }catch(e){}
    if(rendered||attempts>=120){clearInterval(poller);}
  },500);

  // postMessage fallback
  window.addEventListener('message',function(e){
    try{
      var d=typeof e.data==='string'?JSON.parse(e.data):e.data;
      if(d)handleData(d.toolOutput||d.output||d.result||d.notifyToolOutput||d);
    }catch(ex){}
  });
})();
</script></body></html>

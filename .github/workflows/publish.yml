name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build .mcpb bundle (with dependencies)
        run: |
          # Install bundle server dependencies (gitignored, so missing in CI)
          cd bundle/server && npm ci && cd ../..
          # Build the .mcpb (syncs version, copies source, zips)
          node scripts/build-mcpb.js

      - name: Upload .mcpb to GitHub Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./purmemo-mcp.mcpb
          asset_name: purmemo-mcp.mcpb
          asset_content_type: application/octet-stream

      - name: Trigger Remote MCP redeploy
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_MCP_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' \
            && echo "✅ Remote MCP redeploy triggered" \
            || echo "⚠️ Remote MCP redeploy failed (non-blocking)"

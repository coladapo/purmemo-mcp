name: Auto-Deploy with Safety Checks

# Runs automatically every time you push to main
on:
  push:
    branches: [main]

jobs:
  auto-safety-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 1. Install dependencies
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: v1-mvp/backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      # 2. Run all tests (catches bugs before deployment)
      - name: Run Tests
        working-directory: v1-mvp/backend
        run: |
          pytest tests/ -v --tb=short || {
            echo "❌ Tests failed - deployment blocked"
            exit 1
          }

      # 3. Check for dangerous database changes
      - name: Validate Migrations
        working-directory: v1-mvp/backend
        run: |
          python scripts/validate_migrations.py || {
            echo "❌ Unsafe migration detected - deployment blocked"
            exit 1
          }

      # 4. Deploy to production (only if checks pass)
      - name: Deploy to Render
        if: success()
        run: |
          echo "✅ All safety checks passed - deploying to production"
          # Render auto-deploys on git push, so this is just logging

      # 5. Send Slack notification
      - name: Notify on Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "✅ Deployment successful - all safety checks passed",
              attachments: [{
                color: 'good',
                text: 'Production deployment completed'
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      # 6. Alert on failure (auto-blocks deployment)
      - name: Notify on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "❌ Deployment blocked - safety checks failed",
              attachments: [{
                color: 'danger',
                text: 'Check GitHub Actions for details'
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
